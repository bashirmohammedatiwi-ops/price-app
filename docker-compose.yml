services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - HOST=0.0.0.0
      - DATABASE_PATH=/data/prices.sqlite
    volumes:
      - backend_data:/data
    restart: unless-stopped

volumes:
  backend_data:

