services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PORT=5000
      - HOST=0.0.0.0
      - DATABASE_PATH=/data/prices.sqlite
      - BODY_LIMIT=25mb
    ports:
      - "5000:5000"
    volumes:
      - backend_data:/data
    restart: unless-stopped
  admin-web:
    build:
      context: ./web/admin
      dockerfile: Dockerfile
    ports:
      - "5001:8080"
    depends_on:
      - backend
    restart: unless-stopped
  client-web:
    build:
      context: ./web/client
      dockerfile: Dockerfile
    ports:
      - "5002:8080"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:

