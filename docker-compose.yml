services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PORT=5000
      - HOST=0.0.0.0
      - DATABASE_PATH=/data/prices.sqlite
    volumes:
      - backend_data:/data
    restart: unless-stopped
  admin-web:
    build:
      context: ./web/admin
      dockerfile: Dockerfile
    depends_on:
      - backend
    restart: unless-stopped
  client-web:
    build:
      context: ./web/client
      dockerfile: Dockerfile
    depends_on:
      - backend
    restart: unless-stopped
  gateway:
    image: caddy:2.8-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - admin-web
      - client-web
    restart: unless-stopped

volumes:
  backend_data:
  caddy_data:
  caddy_config:

